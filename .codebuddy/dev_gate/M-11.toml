]
primary_artifact = "benchmarks/results/e2e_gptq_cuda_pim_M11_default_offload88.json"

suggested_commands = [
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles short --offload-values 2 16 32 48 64 --max-new-tokens 32 --json-out benchmarks/results/residency_sweep_M11_short.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles short --offload-values 80 96 --max-new-tokens 32 --json-out benchmarks/results/residency_sweep_M11_high.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles short --offload-values 84 88 92 --max-new-tokens 32 --json-out benchmarks/results/residency_sweep_M11_boundary.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles short --offload-values 94 95 --max-new-tokens 32 --json-out benchmarks/results/residency_sweep_M11_boundary2.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles medium --offload-values 80 88 94 --max-new-tokens 16 --json-out benchmarks/results/residency_sweep_M11_medium.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles long --offload-values 64 80 88 --max-new-tokens 8 --json-out benchmarks/results/residency_sweep_M11_long_safe.json",
    "python benchmarks/benchmark_residency_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --prompt-profiles long --offload-values 94 --max-new-tokens 8 --json-out benchmarks/results/residency_sweep_M11_long.json",
