milestone_id = "M-11"
title = "Residency sweep: offload_device_experts=88 becomes safe default, decode TPS 0.284→0.623 (+119%)"

prerequisites = ["M-10"]

required_artifacts = [
    "benchmarks/results/e2e_gptq_cuda_pim_M11_default_offload88.json",
    "benchmarks/results/residency_sweep_M11_short.json",
    "benchmarks/results/residency_sweep_M11_high.json",
    "benchmarks/results/residency_sweep_M11_boundary.json",
    "benchmarks/results/residency_sweep_M11_boundary2.json",
    "benchmarks/results/residency_sweep_M11_medium.json",
