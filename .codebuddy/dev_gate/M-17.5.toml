# M-17.5 conclusion (NEGATIVE):
#
# The speculative preload mechanism IS correct and IS effective at
# warming the LRU:
#     cross_layer_preload triggered : 1312 / 1390 batched groups (94%)
#     load_count (real PIM weight loads) : 6616 -> 5048  (-1568, -24%)
#     load_total_sum : 6.73s -> 4.87s  (-1.86s)
#
# But end-to-end decode regresses:
#     decode_tps     : 0.7456 -> 0.6997  (-6.16%)
#     decode_seconds : 42.92s -> 45.73s  (+2.81s)
#
# Root cause:
#  1. Trigger fires AFTER layer N's down infer_many_raw completes,
#     so the DPU set is already idle when the speculative pushes go
#     out.  There is no concurrent DPU compute to hide them behind
#     (GPU attention runs on a different process thread but Python
#     GIL + pinned-memory paths defeat real concurrency).
#  2. Per-call Python overhead (dict update, sort, K * 2 ctypes
#     preload calls per group) on 1312 groups dominates the savings.
#
# Decision: NOT merging into pim.  Lessons:
#  - Speculative preload must fire BEFORE or DURING DPU compute,
#    not after.
#  - The mechanism itself (process-level _layer_backends registry +
#    per-layer route histogram) is sound and reusable; only the
#    trigger location is wrong.
#  - M-17.6 candidate: move the trigger into the gate+up phase so
#    next-layer preload overlaps THIS layer's gate+up DPU launch
#    AND its host-side silu*up window — same shape of overlap as
#    M-17.3's down-preload-overlap, just stretched across layers.

next_tasks = [
    "M-17.6: re-attempt cross-layer preload with the trigger relocated to the gate+up phase (inside _run_quantized_experts_batched_on_dpu BEFORE the down infer), so next-layer ASYNC pushes overlap THIS layer's down DPU launch and host post-processing.",
    "M-17.7 / M-18: routing-aware GPU residency (orthogonal to all the M-17 DMA/launch overlap work; targets PIM call count via better static residency selection rather than dynamic timing).",
]

