# M-17.6 conclusion (NEGATIVE):
#
# Goal: address M-17.5's negative result by relocating the cross-layer
# speculative preload trigger from end-of-call to BEFORE gate+up
# infer_many_raw.  Also reduced top_k from 2 to 1 to bound per-call
# Python+ctypes overhead.
#
# Result: still regresses, AND the LRU-warming mechanism that worked
# in M-17.5 now backfires:
#     decode_tps     0.7456 -> 0.7140  (-4.24%)
#     load_count     6616   -> 7006    (+5.9%, WORSE than baseline)
#     cross_layer    1323 / 1390 batched groups (95% trigger rate)
#
# Refined root cause (covers BOTH M-17.5 and M-17.6):
# With pim_layer_group_size=48 (current default), all 48 layers share
# one (gate_up, down) runtime pair with NUM_SLOTS=8.  Cross-layer
# preload either (a) fires after DPU is idle and gives no overlap
# (M-17.5), or (b) fires earlier and gets immediately demoted in LRU
# by this layer's down preload, so the next layer evicts the
# preloaded slot anyway (M-17.6).  The 8-slot LRU is too small to
# carry warm-up across layer boundaries.
#
# Decision: NOT merging.  Closes the entire cross-layer-preload
# direction on this hardware topology.  Would need either NUM_SLOTS
# bump (DPU MRAM constraint, expensive) or layer_group_size shrink
# (M-9 already showed coordination overhead loses on 39 ranks) to
# make this direction viable.

