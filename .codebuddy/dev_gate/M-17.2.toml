milestone_id = "M-17.2"
title = "Async DMA push for weight load + deferred dpu_sync at run/shutdown entry — overlaps weight DMA with kernel launch"

prerequisites = ["M-17"]

required_artifacts = [
    "benchmarks/results/e2e_gptq_cuda_pim_M17_lut_cache_offload92.json",
    "benchmarks/results/e2e_gptq_cuda_pim_M17_2_async_dma_offload92.json",
]
