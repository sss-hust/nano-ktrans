# M-17.4 conclusion (NEGATIVE):
#   - Per-slot ASYNC DMA does NOT win on UPMEM hardware: dpu_push_xfer
#     is bandwidth-bound on the rank/dimm bus, so multiple inflight
#     pushes serialise inside the SDK regardless of host buffering.
#   - The 8x host RAM footprint of the per-slot staging buffers
#     measurably hurts CPU cache behaviour on the
#     ensure_buffer / memcpy / LUT memcpy paths
#     (load_total_sum 6.73s -> 8.59s, +1.86s).
#   - Net: decode_tps 0.7456 -> 0.7343 (-1.51%).
#   - DECISION: keep the branch + artifact for reproducibility but do
#     NOT merge.  pim main line stays at M-17.3.
#
# Lesson for M-17.5+:
#   - DMA-overlap optimisations should focus on overlapping different
#     hardware resources (DMA bus vs DPU compute vs host CPU), not on
#     pushing more parallelism into a single bus.
#   - Multi-buffering only pays off when the producer and consumer of
#     the buffer are on different physical units.

next_tasks = [
