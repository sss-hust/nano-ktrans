milestone_id = "M-2"
title = "Genuine T-MAC kernel_mode=7: DPU software multiply removed from the inner loop"

# M-2 is unlocked only after M-1 passes (so we have trustworthy numbers
# to compare mode=7 against).
prerequisites = ["M-1"]

required_artifacts = [
    "benchmarks/results/pim_shape_sweep_M2_tmac.json",
]
primary_artifact = "benchmarks/results/pim_shape_sweep_M2_tmac.json"

suggested_commands = [
    "python benchmarks/benchmark_pim_shape_sweep.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --kernel-modes 4 7 --json-out benchmarks/results/pim_shape_sweep_M2_tmac.json",
]

next_tasks = [
    "M-3: BackendCostModel + async PIM submit (ADR-001 P3+P6).",
    "Replace tests/test_core.py::TestQuantizedKernelAudit with a mode=7 numerical-correctness test suite.",
]

# KPI-a: at least one cell (any quantized mode) must reach PIM >= 1.5x.
[[acceptance_checks]]
path   = "summary.quantized_modes.pim_vs_cpu_grouped_ratio_max"
op     = ">="
value  = 1.5
reason = "ADR-002 KPI: at least one quantized cell must reach PIM >= 1.5x CPU grouped."

# KPI-b: no quantized-mode cell may fall below 0.9x CPU grouped.  This is
# the 'no batch-cliff' guardrail.  Restrict to quantized modes so the
# soft-float mode=3 baseline does not drag the minimum below the floor.
[[acceptance_checks]]
path   = "summary.quantized_modes.pim_vs_cpu_grouped_ratio_min"
op     = ">="
value  = 0.9
reason = "ADR-002 KPI: quantized modes must not drop below 0.9x CPU (eliminates the batch>1 cliff)."

# KPI-c: quantized-mode numerical accuracy bound from ADR-002 §1.
[[acceptance_checks]]
path   = "summary.quantized_modes.max_abs_error_max"
op     = "<="
value  = 0.05
reason = "ADR-002 numerical accuracy requirement: max_abs_error (quantized modes) <= 0.05 relative to saturation."

# KPI-d: coverage check — sweep must include mode=7 and at least the
# canonical {1, 4, 8} batch samples.  The rule below flags absence of
# mode=7 by requiring the sweep declare it.  Mode=4 must also be
# present as honest baseline.
[[acceptance_checks]]
path   = "kernel_modes"
op     = "exists"
reason = "sweep metadata must record which kernel_modes were swept so the verdict is reproducible."

[[acceptance_checks]]
path   = "use_synthetic"
op     = "=="
value  = false
reason = "ADR-002 §5.3: M-2 verdicts require real GPTQ data."
