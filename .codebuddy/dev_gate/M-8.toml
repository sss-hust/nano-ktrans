milestone_id = "M-8"
title = "Handle-based host_quantized_bridge refactor: real runtime isolation landed, 24 preload hits observed (first non-zero in project history), but decode TPS regressed -22% due to coordination overhead"

prerequisites = ["M-7"]

required_artifacts = [
    "benchmarks/results/e2e_gptq_cuda_pim_M8_handle_based.json",
]
primary_artifact = "benchmarks/results/e2e_gptq_cuda_pim_M8_handle_based.json"

suggested_commands = [
    "python benchmarks/benchmark_inference.py --model-path /home/yangfu/models/Qwen--Qwen3-30B-A3B-GPTQ-Int4 --backends cuda_pim --offload-device-experts 2 --max-new-tokens 32 --json-out benchmarks/results/e2e_gptq_cuda_pim_M8_handle_based.json",
]

next_tasks = [
    "M-9: add --pim-layer-group-size CLI flag to benchmark_inference.py so group_size sweep is a 1-line run, not a code edit.  Sweep group_size ∈ {1, 3, 6, 12, 24, 48} to find the overhead/hit sweet-spot.",
    "M-9: investigate the 0.1% hit-ratio floor — Qwen3 top_k=8 × 128 experts has weaker temporal locality than we assumed in ADR-002 §15.  A histogram of expert reuse between consecutive decode steps will tell us the hit-ratio ceiling independent of slot count.",
    "M-9 / M-10: explore mixed-precision expert storage (ADR-001 P4 HOBBIT) — making each bundle smaller lets more experts fit the same MRAM budget, raising the cache hit ceiling.",
    "M-9 / M-10: dpu_launch(DPU_ASYNCHRONOUS) — the per-runtime coordination overhead is most of M-8's 22% regression, and async submit would hide it behind GPU attention.",
]

# ---------------------------------------------------------------------
# Acceptance rationale — handle-based refactor IS the fix for the
# blocker identified in M-7 §15.3; real isolation is now provable
# via hit-ratio > 0 in e2e diagnostics.  But the headline decode TPS
# still isn't a win because:
#
#   * 16 layer-groups × 2 runtimes × 1 DPU rank each = 32 DPU rank
#     pools.  UPMEM's per-rank dispatch cost (dpu_launch of 1 rank
#     with sharded work vs dpu_launch of 1 rank with *more* work
#     but fewer total dispatch calls) tips the balance the wrong
#     way at our current data volumes.
#   * Qwen3 decode-step expert reuse locality is *far* lower than
#     the ADR-002 §15 estimate — 24 hits across 23330 DPU calls is
#     0.1%, even with speculative preload warming the layer-group
#     LRU.  This suggests the working set argument was not just
#     big, it was essentially *random*.
#
# M-8 therefore closes as the 5th milestone in the "infra correct,
# null e2e" family (M-2 T-MAC, M-5 dual, M-6 multi-slot, M-7
# per-layer, M-8 handle-based).  Crucially M-8 resolves the *cause*
# of M-5/M-6/M-7 null perf — the shared .so static-globals bug
# described in ADR-002 §15 — and proves it via a non-zero hit count
# for the first time in the project.  The new blocker is an
# architectural one (Qwen3 routing locality + per-rank dispatch
# overhead) that requires M-9+ to attack.
# ---------------------------------------------------------------------

[[acceptance_checks]]
path     = "results[0].status"
op       = "=="
value    = "ok"
reason   = "handle-based bridge must complete without heap corruption (M-7 crash root-cause fixed)."

[[acceptance_checks]]
path     = "results[0].error"
op       = "not_exists"
reason   = "no top-level error field on the handle-based run."

[[acceptance_checks]]
path     = "results[0].runs[0].generated_tokens"
op       = ">="
value    = 32
reason   = "handle-based run must produce the full 32-token budget."

# The positive contract: isolation is REAL now, so hit_local must be
# strictly positive — this is the first non-zero value in project
# history and directly proves that M-5/M-6/M-7 Python-layer work
# can now land.
[[acceptance_checks]]
path     = "sum(results[0].offload_diagnostics.layers[*].backend.quantized_preload_hits_local)"
op       = ">="
value    = 1
reason   = "first non-zero preload hit in project history — proves the .so handle refactor actually decoupled runtimes (ADR-002 §15)."

# Speculative preload must have actually fired now that it's safe.
[[acceptance_checks]]
path     = "sum(results[0].offload_diagnostics.layers[*].backend.speculative_preload_gptq_count)"
op       = ">="
value    = 1
reason   = "speculative_preload_gptq is default-True in M-8; its counter must advance, proving the warm-up path is exercised."

# Still heap-safe means the DPU bridge runs real work.
[[acceptance_checks]]
path     = "sum(results[0].offload_diagnostics.layers[*].backend.real_dpu_quantized_calls)"
op       = ">="
value    = 10000
reason   = "PIM must still actually run real DPU work."

[[acceptance_checks]]
path     = "sum(results[0].offload_diagnostics.layers[*].backend.real_dpu_quantized_calls)"
op       = "<="
value    = 28000
reason   = "fused gate+up (M-4) must still be active — 2 calls/expert, not 3."

# M-7 infra still landed: per-layer-group scoping produces the
# diagnostic tag.
[[acceptance_checks]]
path     = "results[0].offload_diagnostics.layers[0].backend.pim_layer_group_size"
op       = "=="
value    = 3
reason   = "M-7 per-layer-group scoping must still be in effect (default group_size=3)."

# Honest perf floor: M-8 IS a regression vs M-4's 0.317, but it's
# not a disaster.  Guard against catastrophic regression only.
[[acceptance_checks]]
path     = "results[0].runs[0].decode_tokens_per_second"
op       = ">="
value    = 0.20
reason   = "M-8 decode TPS may regress from M-4/M-7's ~0.31 due to 32-rank-pool coordination overhead; guard only against a severe regression below 0.20."
